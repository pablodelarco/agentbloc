                    - listitem [level=1] [ref=e168]: 32% of brands say they’ll be establishing or expanding their use of pop-up and in-person experiences in the next year.
                    - listitem [level=1] [ref=e169]: 40% of brands say offering experiential retail would be a top priority for them in the next year, but 57% of them say coordinating it will be a top challenge.
