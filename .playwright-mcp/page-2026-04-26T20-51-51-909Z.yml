                  - heading "Consumer statistics" [level=4] [ref=e221]
                  - list [ref=e222]:
                    - listitem [level=1] [ref=e223]: In the last year, 41% of consumers said brands that made it easy to understand the actions they’re taking to achieve their environmental and/or social impact goals had a significant influence on their purchasing decisions.
                    - listitem [level=1] [ref=e224]: In 2021, 44% of customers chose to buy from brands that have a clear commitment to sustainability.
                    - listitem [level=1] [ref=e225]: In the last year, 41% of consumers chose to buy from brands that have a clear commitment to social causes.
                    - listitem [level=1] [ref=e226]: 42% of consumers said that knowing a brand is actively working on reducing their carbon footprint is important when deciding whether to purchase a product online.
                    - listitem [level=1] [ref=e227]: 46% of customers are more likely to purchase a product online if they’re able to recycle the product packaging.
                  - heading "Employee and customer acquisition and retention retail statistics" [level=2] [ref=e228]
                  - paragraph [ref=e229]:
                    - text: Forty-nine percent of retailers say hiring and
                    - link "retaining employees" [ref=e230] [cursor=pointer]:
                      - /url: /retail/employee-retention
                    - text: will be a top challenge over the next year, something 40% of brands are striving to improve. This comes as no surprise considering
                    - link "staff at major retailers" [ref=e231] [cursor=pointer]:
                      - /url: https://www.businessinsider.com/retail-workers-tight-labor-market-rage-quit-pay-2021-6?international=true&r=US&IR=T
                    - text: have been expressing their frustration with the industry through striking and quitting.
                  - blockquote [ref=e232]:
                    - text: Job openings in the US have
                    - link "hit an all-time high" [ref=e233] [cursor=pointer]:
                      - /url: https://www.reuters.com/business/us-job-openings-rise-record-109-million-july-2021-09-08/
                    - text: ", and UK employers are experiencing the"
                    - link "biggest shortage of job candidates ever" [ref=e234] [cursor=pointer]:
                      - /url: https://www.reuters.com/world/uk/uk-employers-face-worst-shortage-job-candidates-record-rec-2021-09-09/
                    - text: .
                  - paragraph [ref=e235]: This and the fact that shoppers expect top notch customer service means retailers need to reevaluate the store staff's role and provide opportunities and compensation to retain employees, especially because the happiness of your employees trickles down to the experience your customers have with your business.
                  - paragraph [ref=e236]: Technology also plays a vital role in delivering a smooth experience across all sales channels—consumers want to be able to reach customer service on the channel of their choice (like live chat), watch product videos, and receive personalized recommendations. That’s why retailers are investing in employee training and technology to help staff succeed (and boost customer satisfaction) in 2022 and beyond.
                  - heading "Here’s what retailers are doing to improve the employee and customer experience and boost loyalty" [level=3] [ref=e237]
                  - heading "Brand statistics" [level=4] [ref=e238]
                  - list [ref=e239]:
                    - listitem [level=1] [ref=e240]: 39% of retailers say they’re investing in improving the tools and technologies employees use to do their day-to-day work.
                    - listitem [level=1] [ref=e241]: 40% of retailers plan to invest in training store staff to interact with customers using technology to improve the in-store experience.
                    - listitem [level=1] [ref=e242]: 46% of brands are investing in improving the employee experience so they can better serve customers and ultimately boost retention.
                    - listitem [level=1] [ref=e243]: 44% of brands plan to increase their employees’ interaction time with customers over the next year.
                    - listitem [level=1] [ref=e244]: 47% of brands plan to use customer feedback to improve products or customer experience within the next year.
                  - heading "Consumer statistics" [level=4] [ref=e245]
                  - list [ref=e246]:
                    - listitem [level=1] [ref=e247]: 58% of consumers say excellent past customer service influenced their decision to buy.
                    - listitem [level=1] [ref=e248]: In the last year, 58% of consumers say the ability to easily reach customer service on the channel of their choice influenced their decision to purchase.
                    - listitem [level=1] [ref=e249]: 43% of consumers say they’re likely to use live chat in the next year.
                    - listitem [level=1] [ref=e250]:
                      - text: 50% of consumers want to watch
                      - link "product videos" [ref=e251] [cursor=pointer]:
                        - /url: /blog/product-video
                      - text: before they buy.
                    - listitem [level=1] [ref=e252]: 50% of consumers say personalization based on their interests and past purchases have influenced their decision to purchase from a brand over the last year.
                  - heading "Shipping and logistics retail statistics" [level=2] [ref=e253]
                  - paragraph [ref=e254]:
                    - text: In the second half of 2021,
                    - link "supply chain" [ref=e255] [cursor=pointer]:
                      - /url: /retail/search?q=supply+chain
                    - text: challenges were one of the most talked about parts of commerce. Thirty-nine percent of brands say shipping and manufacturing delays and shipping costs will continue to be a top supply-chain-related challenge in the next 12 months, while roughly 45% of shoppers are actively looking for businesses that clearly show anticipated delivery times.
                  - paragraph [ref=e256]: Consumers generally understand these difficulties, but they still want their orders delivered quickly, for free, and on time.
                  - paragraph [ref=e257]:
                    - text: To meet customer expectations, brands and retailers must digitize their supply chains, focus on sustainability, lower costs associated with
                    - link "last mile delivery" [ref=e258] [cursor=pointer]:
                      - /url: /retail/last-mile-delivery
                    - text: ", and be transparent about the supply-chain-related complications they’re facing."
                  - heading "Here are the notable retail statistics related to shipping and logistics" [level=3] [ref=e259]
                  - heading "Brand statistics" [level=4] [ref=e260]
                  - list [ref=e261]:
                    - listitem [level=1] [ref=e262]: 49% of the brands are investing in not just their delivery practices but also transparency with their delivery promises, like sharing when an order is prepared and shipped.
                    - listitem [level=1] [ref=e263]:
                      - text: 43% of retailers are changing their shipping strategies to reduce the impact of global
                      - link "shipping delays" [ref=e264] [cursor=pointer]:
                        - /url: /retail/shipping-delays
                      - text: .
                    - listitem [level=1] [ref=e265]:
                      - text: 41% of merchants plan to invest further in buy online, pickup in-store options like
                      - link "curbside pickup" [ref=e266] [cursor=pointer]:
                        - /url: /retail/curbside-pickup
                      - text: and
                      - link "click and collect" [ref=e267] [cursor=pointer]:
                        - /url: /retail/click-and-collect-reduce-retail-returns-and-increase-foot-traffic-with-in-store-pickup-options
                      - text: .
                  - heading "Consumer statistics" [level=4] [ref=e268]
                  - list [ref=e269]:
                    - listitem [level=1] [ref=e270]: When it comes to searching for and buying products online, consumers find the following most valuable; 74% say upfront shipping costs, 68% say free returns and estimated arrival time, 59% say back-in-stock alerts , and 54% say available inventory alerts.
                  - list [ref=e271]:
                    - listitem [level=1] [ref=e272]: 60% of consumers expect same-, next-, or two-day delivery, and 58% of those shoppers expect free next-day delivery.
                    - listitem [level=1] [ref=e273]: 35% of consumers are choosing shipping options like curbside pickup or click and collect to receive their orders in time.
                    - listitem [level=1] [ref=e274]: 75% of shoppers say free shipping continues to have a significant influence on purchasing decisions.
                  - list [ref=e275]:
                    - listitem [level=1] [ref=e276]: 60% of consumers say fast shipping influences their decision to buy online.
                    - listitem [level=1] [ref=e277]: 53% of consumers say flexible shipping influences their decision to buy online.
                  - list [ref=e278]:
                    - listitem [level=1] [ref=e279]: In the last year, 32% of customers have abandoned their carts because the estimated shipping time was too long.
                    - listitem [level=1] [ref=e280]: In 2021, 23% of shoppers abandoned their carts because there was no guaranteed delivery date.
                  - heading "Apply these retail statistics to your store" [level=2] [ref=e281]
                  - paragraph [ref=e282]:
                    - text: Whether you have one or many retail stores or prefer temporary retail options like pop-up shops and events, taking these retail statistics into account as we head into 2022 will help keep your business relevant as the retail landscape continues to evolve. If you’re not sure how to start implementing these trends, check out our
                    - link "Future of Retail 2022 report" [ref=e283] [cursor=pointer]:
                      - /url: http://shopify.com/research/future-of-commerce/future-of-retail?utm_source=blog&utm_medium=content&utm_campaign=2022-01-future-retail-report&utm_content=retail_foc_retail_statististics
                    - text: for actionable tips and merchant success stories.
