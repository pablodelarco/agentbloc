                      - text: say in-store browsing is a way to disconnect from the digital world.
                    - listitem [level=1] [ref=e179]: More than one-third of consumers in the UK, Australia, and New Zealand say a sense of community is a top motivator to visit local shops.
                    - listitem [level=1] [ref=e180]: 34% of consumers are likely to engage with appointment shopping in 2022.
                  - heading "Omnichannel retail statistics" [level=2] [ref=e181]
