                    - listitem [level=1] [ref=e174]: 95% of consumers expect retailers to have COVID safety protocols in place for in-store shopping.
                    - listitem [level=1] [ref=e175]: In the last year, 47% of consumers were more likely to purchase from a brand due to its local presence.
