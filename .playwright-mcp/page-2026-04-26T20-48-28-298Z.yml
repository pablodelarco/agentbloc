      - heading "OEWS Research Estimates by State and Industry" [level=1] [ref=e73]
      - paragraph [ref=e74]: The OEWS program provides wage and employment estimates by state and industry beginning with the May 2012 reference period. These estimates are intended for research purposes, and users should be aware of the limitations of the data.
      - heading "Reliability of the Estimates" [level=2] [ref=e75]
      - paragraph [ref=e76]: As with all data derived from sample surveys, OEWS research estimates are subject to sampling and non-sampling error. Sampling error occurs as a result of sampling from a population rather than recording the population's true value; this is what sets a survey apart from a census. The variation that results from sampling procedures is given by a standard error. OEWS research estimates give the standard error of the estimate divided by the estimate itself, then multiplied by 100; this is known as the percent relative standard error (PRSE). For example, if the estimate of occupation A in state B is 50 and the standard error is 5, the PRSE of the estimate is (5/50)*100, or 10 percent.
      - paragraph [ref=e77]: OEWS research estimates are also subject to non-sampling error. Non-sampling error can occur for many reasons, including the failure to include a segment of the population, the inability to obtain data from all units in the sample, the inability or unwillingness of respondents to provide data on a timely basis, mistakes made by respondents, errors made in the collection or processing of the data, and errors from the employment benchmark data used in estimation.
      - heading "Important Features of the OEWS Research Estimates" [level=3] [ref=e78]
      - list [ref=e79]:
        - listitem [ref=e80]:
          - strong [ref=e81]: Estimates prior to May 2012 are not available.
        - listitem [ref=e82]:
          - text: Estimates are only available for states;
          - strong [ref=e83]: industry-specific estimates for metropolitan areas are not available.
        - listitem [ref=e84]:
          - text: Estimates are only available for detail and major occupation groups;
          - strong [ref=e85]: industry-specific estimates for broad and minor occupation groups are not available.
      - paragraph [ref=e86]:
        - text: Additional information may be available from the State Workforce Agency (SWA) in each state. Format and medium of the data vary by state. To determine whether additional estimates are available for a particular State, please contact the appropriate office on the
        - link "State Contact List" [ref=e87] [cursor=pointer]:
          - /url: /bls/ofolist.htm
        - text: .
      - heading "How to Obtain OEWS Research Estimates" [level=2] [ref=e88]
      - paragraph [ref=e89]: Estimates are available for download in XLS format at the links below. The files are organized by year and similar groups of industry sectors according to the North American Industrial Classification System (NAICS).
