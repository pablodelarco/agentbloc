    - generic [ref=e178]:
      - heading "About the Upwork Research Institute" [level=2] [ref=e179]
      - generic [ref=e180]:
        - text: The world of work is not the same as it was just a few years ago and leaders are facing brand new challenges as a result. The old work playbook is gone, and in its place, there are debates and decisions around workforce location, worker arrangements, and flexibility. However, leaders do not need to navigate this new world of work on their own.
        - text: The Upwork Research Institute is committed to studying the fundamental shifts in the workforce and providing business leaders with the tools and insights they need to navigate the here and now while preparing their organization for the future. Using our proprietary platform data, global survey research, partnerships, and academic collaborations, we will produce evidence-based insights to create the blueprint for the new way of work.
      - heading "Meet the experts" [level=2] [ref=e181]
      - generic [ref=e183]:
        - generic [ref=e184]: Senior Research Manager, Upwork Research Institute
        - heading "Gabby Burlacu, Ph.D" [level=3] [ref=e185]
        - paragraph [ref=e186]: Dr. Gabby Burlacu is a Senior Research Manager at Upwork, focused on how organizations evolve their talent strategies in a rapidly evolving world of work. Her research has shaped workforce transformation efforts at Fortune 500 companies and appears in peer-reviewed journals and books. She holds a Ph.D. in industrial-organizational psychology from Portland State University and brings deep expertise in workplace behavior and inclusive, agile work models.
        - link "Click here to visit linkedin page of this person" [ref=e187] [cursor=pointer]:
          - /url: https://www.linkedin.com/in/gabby-burlacu/
          - generic [ref=e188]: LinkedIn
      - generic [ref=e191]:
        - generic [ref=e192]: Economist, Upwork Research Institute
        - heading "Ted Liu, Ph.D" [level=3] [ref=e193]
        - paragraph [ref=e194]: Dr. Ted Liu is an Economist at Upwork, where he studies how AI and technological change are transforming the labor market and reshaping skill demand. He holds a Ph.D. in economics from the University of California, Santa Cruz, and specializes in labor market dynamics and quantitative research. His work informs Upwork’s insights on workforce shifts, economic opportunity, and policy.
        - link "Click here to visit linkedin page of this person" [ref=e195] [cursor=pointer]:
          - /url: https://www.linkedin.com/in/tengliu/
          - generic [ref=e196]: LinkedIn
      - generic [ref=e199]:
        - generic [ref=e200]: Research Analyst, Upwork Research Institute
        - heading "Takeshi Matsuda" [level=3] [ref=e201]
        - paragraph [ref=e202]: Takeshi Matsuda is a Research Analyst at Upwork, focusing on how technological progress is reshaping the landscape of work and skills. He holds a B.Sc. in quantitative economics and data science from Beloit College, with research interests in behavioral economics and labor markets. His work contributes to Upwork’s research on evolving workforce dynamics and the future of work.
        - link "Click here to visit linkedin page of this person" [ref=e203] [cursor=pointer]:
          - /url: https://www.linkedin.com/in/takeshi-matsuda-41777b1ab/
          - generic [ref=e204]: LinkedIn
    - generic [ref=e207]:
      - heading "Meet our Strategic Partners" [level=2] [ref=e208]
      - generic [ref=e210]:
        - strong [ref=e211]: "Guiding the Future of Work at the Intersection of AI and Economics:"
        - text: The Economic Advisory Council (EAC) is a strategic partner to the Upwork Research Institute, bringing together world-renowned economists and researchers from institutions like MIT, Stanford, and Georgetown. Formed to deepen our understanding of AI’s impact on work, the Council ensures our research, insights, and innovations are grounded in real-world economic theory and labor market data. Learn more about the council members below.
      - generic [ref=e213]:
        - group "1 / 6" [ref=e214]:
          - generic [ref=e215]:
            - heading "Dr. Nicholas Bloom" [level=3] [ref=e216]
            - paragraph [ref=e217]: Dr. Nicholas Bloom, professor of economics at Stanford University and senior fellow at the Stanford Institute for Economic Policy Research (SIEPR). Bloom’s research focuses on management practices, productivity measurement, and organizational behavior, with recent studies exploring the future of remote work and AI’s impact on workplace dynamics.
        - group "2 / 6" [ref=e219]:
          - generic [ref=e220]:
            - heading "Dr. John Horton" [level=3] [ref=e221]
            - paragraph [ref=e222]: Dr. John Horton, associate professor at the MIT Sloan School of Management and faculty research fellow at the National Bureau of Economic Research (NBER). Horton’s research focuses on information systems, market design, labor economics, organizational dynamics, and the effects of AI on labor markets.
        - group "3 / 6" [ref=e224]:
          - generic [ref=e225]:
            - heading "Dr. Sendhil Mullainathan" [level=3] [ref=e226]
            - paragraph [ref=e227]: Dr. Sendhil Mullainathan, professor in the Department of Economics and the Department of Electrical Engineering and Computer Science at MIT. Mullainathan’s research applies machine learning to complex problems in human behavior, social policy, and medicine.
        - group "4 / 6" [ref=e229]:
          - generic [ref=e230]:
            - heading "Dr. Dewey Murdick" [level=3] [ref=e231]
            - paragraph [ref=e232]: Dr. Dewey Murdick, executive director of the Center for Security and Emerging Technology (CSET) at Georgetown University. Murdick specializes in technology foresight, AI policy, and data science, with a focus on how emerging technologies reshape labor markets and societal structures.
        - group "5 / 6" [ref=e234]:
          - generic [ref=e235]:
            - heading "Dr. Andrew Rabinovich" [level=3] [ref=e236]
            - paragraph [ref=e237]: Dr. Andrew Rabinovich, vice president of artificial intelligence and machine learning at Upwork. Rabinovich leads Upwork’s AI transformation strategy, drawing on over two decades of expertise in machine learning and computer vision. Rabinovich’s research primarily focuses on computer vision, multimodal learning, and structured deep learning architectures.
        - group "6 / 6" [ref=e239]:
          - generic [ref=e240]:
            - heading "Dr. Melissa Valentine" [level=3] [ref=e241]
            - paragraph [ref=e242]: Dr. Melissa Valentine, associate professor of management science and engineering at Stanford University and co-director of the Center for Work, Technology, and Organization. Valentine’s research examines how AI and algorithmic systems transform collaboration, organizational design, and workforce structures.
