          - paragraph [ref=e160]: The mission of the Terwilliger Center for Housing is to ensure that everyone has a home that meets their needs at a price they can afford. Established in 2007 with a gift from longtime member and former ULI chairman J. Ronald Terwilliger, the Center’s activities include technical assistance engagements, forums and convenings, research and publications, and an awards program. The goal is to catalyze the production and preservation of a full spectrum of housing options.
        - generic [ref=e163]:
          - paragraph [ref=e164]: "The Terwilliger Center for Housing is home to important initiatives such as:"
          - list [ref=e165]:
            - listitem [ref=e166]:
              - text: •
              - link "Housing Opportunity Conference" [ref=e167] [cursor=pointer]:
                - /url: https://americas.uli.org/research/centers-initiatives/terwilliger-center-for-housing/upcoming-events-with-the-terwilliger-center/annual-uli-housing-conference/
              - text: — The Housing Opportunity conference is one of the nation’s premier meetings of the residential development, lending, investing, and policy community, and brings together a diverse mix of private and nonprofit real estate developers, public officials, urban and regional planners, housing advocates, architects, investors, and lenders with one common goal – to expand housing opportunities in their communities.
            - listitem [ref=e168]:
              - text: •
              - link "Accelerating Housing Production Grants" [ref=e169] [cursor=pointer]:
                - /url: https://americas.uli.org/research/centers-initiatives/terwilliger-center-for-housing/attainable-housing-for-all-campaign/
              - text: – This new initiative leverages ULI’s technical assistance panels and other forums to directly engage with local communities, bringing expertise to solve unique affordability challenges and expand the production and preservation of attainable housing.
            - listitem [ref=e170]:
              - text: •
              - link "The Housing Impact Awards" [ref=e171] [cursor=pointer]:
                - /url: https://americas.uli.org/research/impact-lab/terwilliger-center-for-housing/awards/
              - text: – These awards recognize best practices that measurably expand housing supply and affordability, and highlight replicable development and policy models that can be adopted at scale in communities across the country.
            - listitem [ref=e172]:
              - text: •
              - link "Homeless to Housed (H2H)" [ref=e173] [cursor=pointer]:
                - /url: https://americas.uli.org/research/centers-initiatives/terwilliger-center-for-housing/homeless-to-housed-initiative/
              - text: – Launched in 2022 and the Terwilliger Center’s newest initiative, H2H works to explore real estate solutions to the growing humanitarian and economic crisis impacting communities everywhere. Core elements of this work include conducting research, promoting cross-sector collaboration, providing
              - link "local technical assistance" [ref=e174] [cursor=pointer]:
                - /url: https://americas.uli.org/research/centers-initiatives/terwilliger-center-for-housing/homeless-to-housed-initiative/open-call-for-ideas-homeless-to-housed-technical-assistance-grants/
              - text: through ULI’s network of district councils, and sharing knowledge and expertise for addressing housing challenges for individuals and families experiencing homelessness.
